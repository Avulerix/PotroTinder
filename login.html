<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotroTInder | Iniciar sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fefaf7 0%, #f0f5ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo a {
            font-size: 2rem;
            font-weight: 800;
            text-decoration: none;
            color: rgb(226, 43, 150);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            color: rgb(33, 100, 16);
            font-size: 2rem;
        }

        .form-card {
            background: white;
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: rgb(33, 100, 16);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #6c7a64;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2c3a26;
        }

        label i {
            color: rgb(226, 43, 150);
            margin-right: 8px;
        }

        input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1.5px solid #e2e8dc;
            border-radius: 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: rgb(226, 43, 150);
            box-shadow: 0 0 0 3px rgba(226, 43, 150, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9aab90;
            background: none;
            border: none;
            font-size: 1.1rem;
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0 1.5rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input {
            width: auto;
            transform: scale(1.05);
        }

        .remember-me label {
            margin-bottom: 0;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .forgot-link {
            color: rgb(226, 43, 150);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .forgot-link:hover {
            color: rgb(33, 100, 16);
        }

        .btn-login {
            width: 100%;
            background: rgb(33, 100, 16);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            background: #1f6e12;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(33, 100, 16, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.8rem 0;
            color: #b8c4ae;
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8dc;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        .social-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0.8rem;
            border-radius: 3rem;
            border: 1.5px solid #e2e8dc;
            background: white;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            color: #4a5a40;
            transition: all 0.2s;
        }

        .social-btn:hover {
            background: #f8faf5;
            border-color: rgb(33, 100, 16);
        }

        .social-btn.google i {
            color: #DB4437;
        }

        .register-prompt {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #6c7a64;
        }

        .register-prompt a {
            color: rgb(226, 43, 150);
            text-decoration: none;
            font-weight: 600;
        }

        .register-prompt a:hover {
            text-decoration: underline;
        }

        .demo-note {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #9aab90;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <a href="index.html" style="color: rgb(33, 100, 16);">
            <i class="fas fa-heart" style=" color: rgb(226, 43, 150);; font-size: 0.9em;"></i> 
            Potro-Tinder
        </a>
    </div>

    <div class="form-card">
        <h1>Bienvenido de vuelta</h1>
        <div class="subtitle">Ingresa a tu cuenta y sigue conectando</div>

        <!-- Mostrar mensaje de error si viene desde login_process.php -->
        <div id="error-message" style="display: none;" class="error-msg"></div>

        <form action="Api/login.php" method="POST" id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                <input type="email" name="email" id="email" placeholder="tucorreo@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" id="togglePasswordBtn">
                        <i class="far fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember" value="1"> 
                    <span>Recordarme</span>
                </label>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-heart"></i> Iniciar sesión
            </button>
        </form>

        <div class="register-prompt">
            ¿No tienes cuenta? <a href="registrer.html">Regístrate gratis</a>
        </div>
        <div class="demo-note">
            <i class="fas fa-flask"></i> PAGINA EN PRUEBAS
        </div>
    </div>
</div>

<!-- Modal recuperar contraseña -->
<div id="forgotModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000;">
    <div style="background: white; max-width: 400px; margin: 1rem; border-radius: 2rem; padding: 2rem; text-align: center;">
        <i class="fas fa-envelope" style="font-size: 2.5rem; color: rgb(226, 43, 150); margin-bottom: 1rem;"></i>
        <h3 style="color: rgb(33, 100, 16); margin-bottom: 0.8rem;">Recuperar contraseña</h3>
        <p style="margin-bottom: 1rem;">Ingresa tu correo y te enviaremos un enlace.</p>
        <input type="email" id="recoveryEmail" placeholder="tucorreo@ejemplo.com" style="width: 100%; padding: 0.8rem; border-radius: 1rem; border: 1px solid #ddd; margin-bottom: 1rem;">
        <button id="sendRecoveryBtn" style="background: rgb(33, 100, 16); color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 2rem; cursor: pointer;">Enviar</button>
        <button id="closeModalBtn" style="background: none; border: none; font-size: 1.5rem; position: absolute; top: 1rem; right: 1.5rem; cursor: pointer;">&times;</button>
    </div>
</div>

<script>
    // Mostrar/ocultar contraseña
    const toggleBtn = document.getElementById('togglePasswordBtn');
    const passwordInput = document.getElementById('password');
    
    toggleBtn.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.innerHTML = type === 'password' ? '<i class="far fa-eye-slash"></i>' : '<i class="far fa-eye"></i>';
    });

    // Capturar parámetro de error en la URL (si viene desde login_process.php)
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    if (error) {
        const errorDiv = document.getElementById('error-message');
        if (error === 'credenciales') {
            errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Email o contraseña incorrectos.';
        } else if (error === 'bloqueado') {
            errorDiv.innerHTML = '<i class="fas fa-ban"></i> Tu cuenta está bloqueada. Contacta al soporte.';
        } else {
            errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Error al iniciar sesión. Intenta de nuevo.';
        }
        errorDiv.style.display = 'block';
        errorDiv.style.background = '#ffe6e6';
        errorDiv.style.color = 'rgb(226, 43, 150)';
        errorDiv.style.padding = '0.8rem';
        errorDiv.style.borderRadius = '1rem';
        errorDiv.style.marginBottom = '1rem';
        errorDiv.style.textAlign = 'center';
        // Insertar al inicio del formulario
        const form = document.getElementById('loginForm');
        form.parentNode.insertBefore(errorDiv, form);
    }
</script>
</body>
</html>
